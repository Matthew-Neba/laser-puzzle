[base]
env_name = laser_puzzle

[vec]
#num buffers is so that 1024/2 = 512 envs are doing env sim (CPU) while 512 are doing policy actoin selection (GPU), and then they rotate
num_buffers = 2
num_threads = 8

[policy]
hidden_size = 128
num_layers = 2

[train]
total_timesteps = 100_000_000
horizon = 48
minibatch_size = 12288
gamma = 0.98
gae_lambda = 0.96
learning_rate = 0.003

# ent_coef = 0.02
# vf_coef = 1.0
