[base]
env_name = laser_puzzle

[vec]
total_agents = 1024
# num_buffers splits rollout work into chunks. With 1024 agents and 2 buffers,
# each buffer has 512 envs. During rollout, Puffer can step one buffer on CPU
# while running policy action selection for another buffer on GPU, then rotate.
num_buffers = 2
num_threads = 8

[policy]
hidden_size = 128
num_layers = 2

[train]
total_timesteps = 125_000_000
horizon = 48
minibatch_size = 12288
gamma = 0.985
gae_lambda = 0.965
learning_rate = 0.004
ent_coef = 0.025
vf_coef = 1.0